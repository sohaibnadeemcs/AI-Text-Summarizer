<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Text Summarizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Ambient animated background -->
  <div class="bg" aria-hidden="true">
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="container">

    <!-- Header -->
    <div class="header">
      <span class="eyebrow">Local model, zero fluff</span>
      <h1>AI Text Summarizer</h1>
      <p>Paste any text below and get an instant AI-powered summary</p>
    </div>

    <!-- Input Section -->
    <div class="card">
      <label for="inputText">Your Text</label>
      <textarea
        id="inputText"
        placeholder="Paste your article, notes, or any long text here..."
        rows="10"
      ></textarea>

      <div class="char-count">
        <span id="charCount">0</span> characters
      </div>

      <button id="summarizeBtn" onclick="summarize()">
        ✨ Summarize
      </button>
    </div>

    <!-- Output Section (hidden until result comes) -->
    <div class="card" id="outputCard" style="display:none;">
      <label>Summary</label>

      <!-- Loading spinner -->
      <div id="loading" style="display:none;">
        <div class="spinner"></div>
        <p class="loading-text">AI is reading your text...</p>
      </div>

      <!-- Result -->
      <div id="result"></div>

      <!-- Copy button -->
      <button class="copy-btn" onclick="copyResult()">
        📋 Copy Summary
      </button>
    </div>

    <!-- Error message -->
    <div id="errorBox" class="error-box" style="display:none;"></div>

    <!-- Footer -->
    <p class="footer">Built by Sohaib Nadeem — Powered by Groq AI</p>

  </div>

  <script src="script.js"></script>
</body>
</html>
